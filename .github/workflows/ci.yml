name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun test

      - name: Coverage
        run: bun test --coverage

      - name: Compile examples
        run: |
          for dir in examples/*/; do
            dir=${dir%/}
            for f in "$dir"/*.tsp; do
              [ -f "$f" ] || continue
              echo "Compiling $f..."
              (cd "$dir" && bunx tsp compile "$(basename "$f")")
            done
          done
